defaults:
  - _self_

task_conf:
  chop_tree:
    text: 'vpt_chop_tree'
    reward_conf:
      pickup:
        log:
          quantity_rewarded: 1000000000
          reward: 1.0
          objs:
            - oak_log
            - spruce_log
            - birch_log
            - jungle_log
            - acacia_log
            - dark_oak_log
            - stripped_oak_log
            - stripped_spruce_log
            - stripped_birch_log
            - stripped_jungle_log
            - stripped_acacia_log
            - stripped_dark_oak_log

close_ended: False
seed: 19961103

origin_resolution: [640, 360]
resize_resolution: [128, 128]

time_limit: 1200

fast_reset: True
slow_reset_interval: 10000
random_tp_range: 100000
start_time: 0
compute_delta_inventory: False
candidate_preferred_spawn_biome: 
  - forest
candidate_weather: 
  - clear

enable_tasks: 
  - chop_tree

custom_init_commands:
  - /effect give @a night_vision 99999 250 true