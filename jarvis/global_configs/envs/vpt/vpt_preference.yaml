defaults:
  - _self_

origin_resolution: [640, 360]
resize_resolution: [128, 128]

close_ended: True
seed: 19961103

time_limit: 600
init_inventory: 
  0: 
    type: iron_sword
    quantity: 1

fast_reset: False
slow_reset_interval: 10
random_tp_range: 1000
start_time: 0
compute_delta_inventory: False
candidate_preferred_spawn_biome: 
  - plains
candidate_weather: 
  - clear

summon_mobs:
  - 
    mob_name: sheep
    range_x: [-20, 20]
    range_z: [-20, 20]
    number: 10
  - 
    mob_name: cow
    range_x: [-20, 20]
    range_z: [-20, 20]
    number: 10
  - 
    mob_name: pig
    range_x: [-20, 20]
    range_z: [-20, 20]
    number: 10
  - 
    mob_name: chicken
    range_x: [-20, 20]
    range_z: [-20, 20]
    number: 10

task_conf:
  kill_cow:
    text: 'preference kill cow'
    obs_conf:
      ctraj: None
    reward_conf: 
      kill_entity:
        cow: 
          num: 1
          reward: 1.0
          terminated: False
        sheep:
          num: 1
          reward: -1.0
          terminated: False
        pig: 
          num: 1
          reward: -1.0
          terminated: False
        chicken:
          num: 1
          reward: -1.0
          terminated: False

enable_tasks: 
  - kill_cow

reset_inventory_open: False
