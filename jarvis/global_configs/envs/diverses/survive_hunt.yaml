
defaults:
  - base
  - _self_

task_conf:
  traj_condition:
    text: "Kill animals, sheep, cow, and pig."
    obs_conf:
      task: "survive: hunt"
      ref_video: "reference_videos/survive_hunt.mp4"
      ins_type: "${oc.env:INS_TYPE}"
    reward_conf:
      kill_entity: 
        animal:
          objs:
            - sheep
            - cow
            - pig
            - chicken
          quantity_rewarded: 1000
          reward: 1.0


candidate_preferred_spawn_biome: 
  - plains
candidate_weather: 
  - clear

summon_mobs: 
  - 
    mob_name: sheep
    range_x: [-5, 5]
    range_z: [-5, 5]
    number: 5
  - 
    mob_name: cow
    range_x: [-5, 5]
    range_z: [-5, 5]
    number: 5

init_inventory: 
  0: 
    type: iron_sword
    quantity: 1

masked_actions: 
  inventory: 0
  hotbar.1: 0
  hotbar.2: 0
  hotbar.3: 0
  hotbar.4: 0
  hotbar.5: 0
  hotbar.6: 0
  hotbar.7: 0
  hotbar.8: 0
  hotbar.9: 0