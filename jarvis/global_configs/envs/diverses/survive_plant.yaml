
defaults:
  - base
  - _self_

task_conf:
  traj_condition:
    text: "Plant wheat seeds in tilled soil to grow wheat."
    obs_conf:
      task: "survive: plant"
      ref_video: "reference_videos/survive_plant.mp4"
      ins_type: "${oc.env:INS_TYPE}"
    reward_conf:
      use_item: 
        plant:
          objs:
            - wheat_seeds
          quantity_rewarded: 1000
          reward: 1.0

candidate_preferred_spawn_biome: 
  - plains
candidate_weather: 
  - clear


custom_init_commands:
